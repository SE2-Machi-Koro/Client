name: SonarCloud Analysis

permissions:
  contents: read
  pull-requests: read
  security-events: write

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Accept Android SDK Licenses & Install Platform 36
        run: |
          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0" "platform-tools"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build and run tests
        run: ./gradlew testDebugUnitTest jacocoTestReport --no-daemon
        env:
          JAVA_TOOL_OPTIONS: "-Xmx4g"

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Export SonarCloud issues as SARIF
        if: github.event_name == 'pull_request'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PROJECT_KEY: SE2-Machi-Koro_Client
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p build/reports/sonar

          curl --fail --silent --show-error \
            --user "${SONAR_TOKEN}:" \
            --get 'https://sonarcloud.io/api/issues/search' \
            --data-urlencode "componentKeys=${PROJECT_KEY}" \
            --data-urlencode "pullRequest=${PR_NUMBER}" \
            --data-urlencode "resolved=false" \
            --data-urlencode "ps=500" \
            --output build/reports/sonar/issues.json

          jq '
            def level:
              if .severity == "BLOCKER" or .severity == "CRITICAL" or .severity == "MAJOR"
              then "error"
              elif .severity == "MINOR"
              then "warning"
              else "note"
              end;

            def path:
              (.component // "" | split(":") | last);

            {
              version: "2.1.0",
              "$schema": "https://json.schemastore.org/sarif-2.1.0.json",
              runs: [
                {
                  tool: {
                    driver: {
                      name: "SonarCloud",
                      informationUri: "https://sonarcloud.io",
                      rules: [
                        .issues[]
                        | {
                            id: .rule,
                            name: .rule,
                            shortDescription: { text: .rule },
                            helpUri: ("https://sonarcloud.io/coding_rules?open=" + .rule)
                          }
                      ] | unique_by(.id)
                    }
                  },
                  results: [
                    .issues[]
                    | select(path != "")
                    | {
                        ruleId: .rule,
                        level: level,
                        message: { text: .message },
                        locations: [
                          {
                            physicalLocation: {
                              artifactLocation: { uri: path },
                              region: {
                                startLine: (.textRange.startLine // .line // 1),
                                startColumn: ((.textRange.startOffset // 0) + 1)
                              }
                            }
                          }
                        ]
                      }
                  ]
                }
              ]
            }
          ' build/reports/sonar/issues.json > build/reports/sonar/sonarcloud.sarif

      - name: Upload SonarCloud SARIF
        if: github.event_name == 'pull_request'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: build/reports/sonar/sonarcloud.sarif
          category: SonarCloud
          ref: refs/pull/${{ github.event.pull_request.number }}/head
          sha: ${{ github.event.pull_request.head.sha }}
